<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Painel - User Manager</title>

  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <main class="container">
    <section class="card card-grande">
      <h1>Painel do Usuário</h1>

      <p class="descricao">
        Área do usuário logado para visualizar e atualizar os próprios dados.
      </p>

      <section id="boas-vindas" class="status-sessao">
        Carregando sessão...
      </section>

      <section id="dados-usuario" class="painel-usuario">
        <p>Carregando dados do usuário...</p>
      </section>

      <section class="acoes-painel">
        <button type="button" id="btn-mostrar-edicao">
          Editar meus dados
        </button>

        <button type="button" id="btn-mostrar-senha" class="botao-secundario">
          Alterar senha
        </button>

        <a id="link-admin-painel" href="./admin.html" class="link-botao escondido">
          Área administrativa
        </a>

        <button type="button" id="btn-sair" class="botao-perigo">
          Sair
        </button>
      </section>

      <section id="area-edicao-perfil" class="area-edicao escondido">
        <h2>Editar meus dados</h2>

        <form id="form-perfil">
          <label for="perfil_nome">Nome completo</label>
          <input type="text" id="perfil_nome" required>

          <label for="perfil_apelido">Apelido</label>
          <input type="text" id="perfil_apelido" required>

          <label for="perfil_email">E-mail</label>
          <input type="email" id="perfil_email" required>

          <label for="perfil_celular">Celular</label>
          <input type="text" id="perfil_celular">

          <div class="acoes-form">
            <button type="submit">Salvar meus dados</button>

            <button type="button" id="btn-cancelar-perfil" class="botao-secundario">
              Cancelar
            </button>
          </div>
        </form>
      </section>

      <section id="area-alterar-senha" class="area-edicao escondido">
        <h2>Alterar senha</h2>

        <form id="form-senha">
          <label for="senha_atual">Senha atual</label>

          <div class="campo-senha">
            <input type="password" id="senha_atual" required>

            <button
              type="button"
              class="btn-toggle-senha"
              data-toggle-senha="senha_atual"
              aria-label="Mostrar senha atual"
              title="Mostrar senha atual"
            >
              👁️
            </button>
          </div>

          <label for="nova_senha">Nova senha</label>

          <div class="campo-senha">
            <input type="password" id="nova_senha" required>

            <button
              type="button"
              class="btn-toggle-senha"
              data-toggle-senha="nova_senha"
              aria-label="Mostrar nova senha"
              title="Mostrar nova senha"
            >
              👁️
            </button>
          </div>

          <label for="confirmar_senha">Confirmar nova senha</label>

          <div class="campo-senha">
            <input type="password" id="confirmar_senha" required>

            <button
              type="button"
              class="btn-toggle-senha"
              data-toggle-senha="confirmar_senha"
              aria-label="Mostrar confirmação de senha"
              title="Mostrar confirmação de senha"
            >
              👁️
            </button>
          </div>

          <div class="acoes-form">
            <button type="submit">Salvar nova senha</button>

            <button type="button" id="btn-cancelar-senha" class="botao-secundario">
              Cancelar
            </button>
          </div>
        </form>
      </section>

      <p id="mensagem" class="mensagem"></p>

      <a class="link-voltar" href="./index.html">Voltar para início</a>
    </section>
  </main>

  <script src="./js/auth.js"></script>
  <script src="./js/senha-toggle.js"></script>
  <script src="./js/painel.js"></script>
</body>
</html>
