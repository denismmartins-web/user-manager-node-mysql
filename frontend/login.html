<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login - User Manager</title>

  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <main class="container">
    <section class="card">
      <h1>Login</h1>

      <p class="descricao">
        Acesse sua conta usando e-mail e senha cadastrados.
      </p>

      <form id="form-login">
        <label for="email">E-mail</label>
        <input type="email" id="email" required>

        <label for="senha">Senha</label>

        <div class="campo-senha">
          <input type="password" id="senha" required>

          <button type="button" class="btn-toggle-senha" data-toggle-senha="senha" aria-label="Mostrar senha"
            title="Mostrar senha">
            👁️
          </button>
        </div>
        <button type="submit">Entrar</button>
      </form>

      <p id="mensagem" class="mensagem"></p>

      <a class="link-voltar" href="./index.html">Voltar para início</a>
    </section>
  </main>
  <script src="./js/senha-toggle.js"></script>
  <script src="./js/login.js"></script>
</body>

</html>
